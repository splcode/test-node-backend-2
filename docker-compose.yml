# LOCAL DEVELOPMENT ONLY. Not used by Coolify (Coolify provisions its own Postgres).
# Spins up Postgres so you can do postgres-first development locally:
#   docker compose up -d
#   npm run db:migrate
#   DATA_SOURCE=postgres npm run dev   (or set it in .env)
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    # Host port 5433 (5432 is often already taken by a local Postgres).
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
